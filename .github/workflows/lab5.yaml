name: Lab5 - DAG Integrity + Docker Build

on:
  push:
  pull_request:

jobs:
  dag-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn matplotlib joblib pytest flake8

      - name: Lint (flake8)
        run: |
          flake8 dags/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: DAG Integrity Test
        run: |
          pytest tests/test_dag.py -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t mlops-lab5 .

      - name: Test Docker image runs
        run: |
          docker run --rm mlops-lab5 python --version
```

