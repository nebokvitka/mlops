name: Model CI (Train, Test, Report)

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn matplotlib seaborn mlflow joblib pytest flake8

      - name: Lint (flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run pre-train tests
        env:
          DATA_PATH: data/raw/heart.csv
        run: |
          pytest tests/test_model.py::test_data_schema -v

      - name: Train model
        run: |
          python train_ci.py

      - name: Run post-train tests
        env:
          F1_THRESHOLD: "0.70"
        run: |
          pytest tests/test_model.py::test_artifacts_exist tests/test_model.py::test_quality_gate_f1 -v

      - name: Upload model artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: model.pkl